<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Errl — Projects</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../../shared/styles/errlDesignSystem.css" />
<link rel="stylesheet" href="../../../../shared/styles/errlStaticPage.css" />
<style>
:root{ --gap:28px; --outer-pad:32px; }
*{box-sizing:border-box} html,body{height:100%;margin:0}
body.errl-static-page{font-family:Inter,system-ui,sans-serif;}

.h1{font-size:clamp(22px,4vmin,34px); font-weight:800; margin:0; opacity:.9}
.grid2{ margin:8px 0 14px; padding: 16px var(--outer-pad) var(--outer-pad); display:grid; gap: var(--gap); grid-template-columns: repeat(2, minmax(360px, 1fr)); align-items:start; }
.grid2 .box{ width: 100% !important; aspect-ratio: 1 / 1 !important; height:auto !important; min-height:360px; }
@media (max-width: 900px){ 
  .grid2{ grid-template-columns: 1fr; }
  .grid2 .box{ min-height: 50vh; } 
  :root{ --outer-pad:20px; }
}
.box{ position:relative; display:flex; flex-direction:column; border-radius:16px; background:rgba(var(--errl-text-rgb), 0.06); border:1px solid rgba(var(--errl-text-rgb), 0.14); box-shadow:0 12px 30px rgba(0,0,0,.38); overflow:hidden; width: var(--w, 400px); max-width: 100%; aspect-ratio: 1 / 1; }
.box header{ position:relative; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 20px; font-weight:700; color:#cfe9ff; border-bottom:1px solid #ffffff14; background:linear-gradient(180deg, rgba(12,18,32,.7), rgba(10,15,24,.6)); }
.box header .controls{ display:flex; align-items:center; gap:8px; font-weight:600; font-size:12px; opacity:.9; }
.box header .controls a.dl{ display:inline-block; padding:6px 10px; border-radius:8px; border:1px solid #ffffff22; background:#10182a; color:#d7eaff; text-decoration:none; font-size:11px; font-weight:600; transition:all 0.2s ease; }
.box header .controls a.dl:hover{ background:#152038; transform:translateY(-1px); box-shadow:0 4px 8px rgba(0,0,0,0.3); }
.box .frame{ position:relative; flex:1; display:grid; place-items:center; background:
  radial-gradient(80% 60% at 50% 35%, rgba(123,92,255,.18), rgba(123,92,255,0) 60%),
  radial-gradient(120% 100% at 50% 120%, rgba(0,229,255,.10), rgba(0,229,255,0) 60%),
  linear-gradient(180deg, #0f1326, #0a0f18 60%);
}
.box .frame iframe{ width:100%; height:100%; border:0; background:transparent; }
</style>
<link rel="stylesheet" href="../../../../shared/styles/errlPortalHeader.css" />
  <script>
    (function () { try { if (localStorage.getItem('errl_portal_show_design_nav') !== 'true') { document.documentElement.setAttribute('data-errl-hide-design-nav', ''); } } catch (e) {} })();
  </script>
<link rel="stylesheet" href="../../../../apps/landing/fx/errl-bg.css">
</head>
<body class="errl-static-page">
  <header class="errl-header">
    <div class="errl-header-content">
<a class="errl-home-btn" href="/"><span class="chevron">◀</span><span>Back to Portal</span></a>
      <nav class="errl-nav" aria-label="Portal sections">
        <a class="errl-bubble-btn" href="/about/" data-portal-link="about/">About Errl</a>
        <a class="errl-bubble-btn active" href="/assets/" data-portal-link="assets/" aria-current="page">Assets</a>
        <a class="errl-bubble-btn" href="/design/" data-errl-nav="design" data-portal-link="design/" data-disabled-link="design" aria-disabled="true" tabindex="-1" title="Coming soon">Design</a>
        <a class="errl-bubble-btn" href="https://forum.errl.wtf">Forum</a>
        <a class="errl-bubble-btn" href="/gallery/" data-portal-link="gallery/">Gallery</a>
        <a class="errl-bubble-btn" href="/studio/" data-portal-link="studio/">Studio</a>
      </nav>
    </div>
  </header>
  <section class="grid2" id="assetsGrid"></section>
<script>
const assets = [
  { title: 'Errl Head Coin', src: './errl-head-coin/index.html', download: './errl-head-coin/index.html', filename: 'Errl_Head_Coin.html' },
  { title: 'Errl Head Coin v2', src: './errl-head-coin-v2/index.html', download: './errl-head-coin-v2/index.html', filename: 'Errl_Head_Coin_v2.html' },
  { title: 'Errl Head Coin v3', src: './errl-head-coin-v3/index.html', download: './errl-head-coin-v3/index.html', filename: 'Errl_Head_Coin_V3.html' },
  { title: 'Errl Head Coin v4', src: './errl-head-coin-v4/index.html', download: './errl-head-coin-v4/index.html', filename: 'Errl_Head_Coin_V4.html' },
  { title: 'Errl Face Popout', src: './errl-face-popout/index.html', download: './errl-face-popout/index.html', filename: 'Errl_Face_Popout.html' },
  { title: 'Walking Errl (Animated SVG)', src: './walking-errl/index.html', download: './walking-errl/index.html', filename: 'Walking_Errl_Animated_SVG.html' },
  { title: 'Color Customizer', src: '/studio/svg-colorer/index.html', download: '/studio/svg-colorer/index.html', filename: 'Errl_Color_Customizer.html' },
  { title: 'Pin Widget', src: '/studio/pin-widget/ErrlPin.Widget/designer.html', download: '/studio/pin-widget/ErrlPin.Widget/designer.html', filename: 'Errl_Pin_Widget.html' },
];
// Escape HTML to prevent XSS
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Escape attribute values
function escapeAttr(text) {
  return escapeHtml(text).replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
}

const grid = document.getElementById('assetsGrid');
for(const t of assets){
  const box = document.createElement('article');
  box.className='box';
  
  // Create header
  const header = document.createElement('header');
  const titleSpan = document.createElement('span');
  titleSpan.textContent = t.title;
  header.appendChild(titleSpan);
  
  // Create controls if download exists
  if(t.download){
    const controls = document.createElement('div');
    controls.className = 'controls';
    const downloadLink = document.createElement('a');
    downloadLink.className = 'dl';
    downloadLink.href = t.download;
    downloadLink.download = t.filename || 'project.html';
    downloadLink.textContent = 'Download HTML';
    controls.appendChild(downloadLink);
    header.appendChild(controls);
  }
  
  // Create frame and iframe
  const frame = document.createElement('div');
  frame.className = 'frame';
  const iframe = document.createElement('iframe');
  iframe.src = t.src; // Safe: t.src is from trusted data array
  iframe.loading = 'lazy';
  iframe.title = t.title;
  
  // Use addEventListener instead of inline onerror to prevent XSS
  iframe.addEventListener('error', () => {
    console.error('Failed to load:', t.src);
  });
  
  frame.appendChild(iframe);
  box.appendChild(header);
  box.appendChild(frame);
  grid.appendChild(box);
}

// Disabled links (Design): prevent navigation and show “Coming soon”.
(() => {
  const TOAST_ID = 'errl-coming-soon-toast';
  let hideTimer = null;
  function showToast(message) {
    let el = document.getElementById(TOAST_ID);
    if (!el) {
      el = document.createElement('div');
      el.id = TOAST_ID;
      el.style.position = 'fixed';
      el.style.left = '50%';
      el.style.bottom = '18px';
      el.style.transform = 'translateX(-50%)';
      el.style.zIndex = '9999';
      el.style.maxWidth = Math.min(window.innerWidth * 0.92, 520) + 'px';
      el.style.padding = '10px 14px';
      el.style.borderRadius = '999px';
      el.style.border = '1px solid rgba(255,255,255,0.22)';
      el.style.background = 'rgba(10, 14, 24, 0.88)';
      el.style.backdropFilter = 'blur(10px)';
      el.style.color = 'rgba(240, 245, 255, 0.96)';
      el.style.font = "600 12px/1.2 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif";
      el.style.letterSpacing = '0.04em';
      el.style.textTransform = 'uppercase';
      el.style.boxShadow = '0 10px 24px rgba(0,0,0,0.45)';
      el.style.opacity = '0';
      el.style.transition = 'opacity 140ms ease, transform 140ms ease';
      document.body.appendChild(el);
    }
    el.textContent = message;
    el.style.opacity = '1';
    el.style.transform = 'translateX(-50%) translateY(0)';
    if (hideTimer) window.clearTimeout(hideTimer);
    hideTimer = window.setTimeout(() => {
      el.style.opacity = '0';
      el.style.transform = 'translateX(-50%) translateY(6px)';
    }, 1400);
  }

  document.querySelectorAll('[data-disabled-link="design"]').forEach((el) => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      showToast('Design — coming soon');
    });
  });
})();
</script>
<script type="module" src="../../../../shared/scripts/portal-nav-visibility.mjs"></script>
</body>
</html>
