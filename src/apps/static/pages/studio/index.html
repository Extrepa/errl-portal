<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Errl Studio Hub</title>
    <link rel="stylesheet" href="../../../../shared/styles/errlDesignSystem.css" />
    <link rel="stylesheet" href="../../../landing/fx/errl-bg.css" />
    <link rel="stylesheet" href="../../../../shared/styles/errlPortalHeader.css" />
    <style>
      :root {
        --studio-bg: #05050a;
        --studio-text: #e7ecff;
        --studio-muted: #9aa7c9;
        --studio-card-gradient: linear-gradient(145deg, rgba(22, 26, 42, 0.95) 0%, rgba(12, 16, 28, 0.95) 45%, rgba(14, 18, 32, 0.95) 100%);
        --studio-card-border: rgba(114, 147, 255, 0.25);
      }
      html, body { margin: 0; min-height: 100%; font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #04060f; color: #f1f5ff; }
      main { background: var(--studio-bg); color: var(--studio-text); }
      .studio-container { max-width: 1080px; margin: 0 auto; padding: 72px 24px 110px; display: flex; flex-direction: column; gap: 42px; }
      .studio-header { display: flex; flex-direction: column; gap: 20px; }
      .studio-header__pill { align-self: flex-start; padding: 10px 16px; border-radius: 999px; background: linear-gradient(135deg, #9ea9ff 0%, #c2c8ff 50%, #9ea9ff 100%); color: #0d1230; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 700; }
      .studio-header__body { display: flex; gap: 24px; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; }
      .studio-header__copy { max-width: 670px; display: flex; flex-direction: column; gap: 12px; }
      .studio-header__title { margin: 0; font-size: clamp(2.3rem, 4vw, 3.2rem); letter-spacing: -0.02em; }
      .studio-header__subtitle { margin: 0; font-size: 1.02rem; line-height: 1.65; color: var(--studio-muted); }
      .studio-header__meta { min-width: 240px; max-width: 340px; padding: 18px 20px; border-radius: 16px; border: 1px solid rgba(148, 174, 255, 0.28); background: linear-gradient(145deg, rgba(22, 28, 45, 0.92), rgba(14, 20, 38, 0.88)); }
      .studio-header__meta-title { margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.17em; font-size: 0.75rem; color: #d2dcff; }
      .studio-header__meta p { margin: 0; color: #c5d4ff; line-height: 1.55; }
      .studio-card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(275px, 1fr)); gap: 20px; }
      .studio-card { border-radius: 20px; background: var(--studio-card-gradient); border: 1px solid var(--studio-card-border); box-shadow: 0 16px 34px rgba(2, 6, 22, 0.55); padding: 20px; display: grid; gap: 12px; }
      .studio-card__header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
      .studio-card__title { margin: 0; font-size: 1.35rem; }
      .studio-card__badge { border-radius: 999px; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.35rem 0.6rem; border: 1px solid rgba(128, 170, 255, 0.4); color: #c8dcff; background: rgba(70, 100, 170, 0.2); }
      .studio-card__description { margin: 0; color: var(--studio-muted); line-height: 1.55; }
      .studio-readiness { border: 1px solid rgba(128, 170, 255, 0.24); border-radius: 12px; padding: 10px; background: rgba(11, 15, 28, 0.74); }
      .studio-readiness__label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.09em; color: #cad8ff; }
      .studio-readiness__meter { margin-top: 0.45rem; height: 8px; border-radius: 999px; background: rgba(82, 96, 146, 0.35); overflow: hidden; }
      .studio-readiness__meter span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, rgba(var(--errl-neon-cyan-rgb), 0.8), rgba(var(--errl-neon-purple-rgb), 0.85)); }
      .studio-readiness__text { margin: 0.5rem 0 0; font-size: 0.84rem; color: #ccdaff; }
      .studio-chip-list { margin: 0; padding: 0; list-style: none; display: flex; flex-wrap: wrap; gap: 0.45rem; }
      .studio-chip-list li { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; border-radius: 999px; padding: 0.25rem 0.5rem; border: 1px solid rgba(var(--errl-neon-purple-rgb), 0.38); color: rgba(var(--errl-neon-cyan-rgb), 0.92); }
      .studio-card__meta-title { margin: 0 0 0.35rem; font-size: 0.76rem; letter-spacing: 0.09em; text-transform: uppercase; color: #cfdcff; }
      .studio-card__meta ul { margin: 0; padding-left: 1rem; color: #b5c6f5; line-height: 1.45; }
      .studio-card__updated { margin: 0; font-size: 0.77rem; color: #98a9d3; text-transform: uppercase; letter-spacing: 0.06em; }
      .studio-card__cta { text-decoration: none; display: inline-flex; align-items: center; gap: 0.45rem; color: #e3eaff; font-weight: 600; font-size: 0.86rem; text-transform: uppercase; letter-spacing: 0.08em; }
      .studio-card__cta::after { content: "↗"; }
      @media (max-width: 760px) { .studio-container { padding: 54px 18px 86px; } }
    </style>
    <script>
      (function () { try { if (localStorage.getItem("errl_portal_show_design_nav") !== "true") { document.documentElement.setAttribute("data-errl-hide-design-nav", ""); } } catch (e) {} })();
    </script>
  </head>
  <body>
    <header class="errl-header">
      <div class="errl-header-content">
        <a class="errl-home-btn" href="/"><span class="chevron">◀</span><span>Back to Portal</span></a>
        <nav class="errl-nav" aria-label="Portal sections">
          <a class="errl-bubble-btn" data-portal-link="about/" href="/about/">About Errl</a>
          <a class="errl-bubble-btn" data-portal-link="assets/" href="/assets/">Assets</a>
          <a class="errl-bubble-btn" href="/design/" data-errl-nav="design" data-portal-link="design/" data-disabled-link="design" aria-disabled="true" tabindex="-1" title="Coming soon">Design</a>
          <a class="errl-bubble-btn" href="https://forum.errl.wtf">Forum</a>
          <a class="errl-bubble-btn" data-portal-link="gallery/" href="/gallery/">Gallery</a>
          <a class="errl-bubble-btn active" href="/studio/" data-portal-link="studio/" aria-current="page">Studio</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="studio-container" id="studio-root"></div>
    </main>

    <script type="module" src="../../../landing/fx/errl-bg.ts"></script>
    <script type="module">
      import { studioPageContent } from "../../content/studio-projects-content.mjs";
      import { mountStudioPage } from "../../../../shared/scripts/static-content-renderers.mjs";

      if (window.ErrlBG && typeof ErrlBG.mount === "function") {
        ErrlBG.mount({ headerVariant: 1, basePath: "../../..", hud: true });
      }

      const root = document.getElementById("studio-root");
      mountStudioPage(root, studioPageContent);

      const TOAST_ID = "errl-coming-soon-toast";
      let hideTimer = null;
      function showToast(message) {
        let el = document.getElementById(TOAST_ID);
        if (!el) {
          el = document.createElement("div");
          el.id = TOAST_ID;
          Object.assign(el.style, {
            position: "fixed", left: "50%", bottom: "18px", transform: "translateX(-50%)", zIndex: "9999",
            maxWidth: Math.min(window.innerWidth * 0.92, 520) + "px", padding: "10px 14px", borderRadius: "999px",
            border: "1px solid rgba(255,255,255,0.22)", background: "rgba(10, 14, 24, 0.88)", backdropFilter: "blur(10px)",
            color: "rgba(240, 245, 255, 0.96)", font: "600 12px/1.2 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif",
            letterSpacing: "0.04em", textTransform: "uppercase", boxShadow: "0 10px 24px rgba(0,0,0,0.45)", opacity: "0",
            transition: "opacity 140ms ease, transform 140ms ease"
          });
          document.body.appendChild(el);
        }
        el.textContent = message;
        el.style.opacity = "1";
        el.style.transform = "translateX(-50%) translateY(0)";
        if (hideTimer) window.clearTimeout(hideTimer);
        hideTimer = window.setTimeout(() => {
          el.style.opacity = "0";
          el.style.transform = "translateX(-50%) translateY(6px)";
        }, 1400);
      }
      document.querySelectorAll('[data-disabled-link="design"]').forEach((el) => {
        el.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          showToast("Design - coming soon");
        });
      });
    </script>
    <script type="module" src="../../../../shared/scripts/portal-nav-visibility.mjs"></script>
  </body>
</html>
