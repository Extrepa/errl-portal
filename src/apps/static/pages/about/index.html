<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>About | Errl / Extrepa Continuum</title>
  <link rel="stylesheet" href="../../../../shared/styles/errlDesignSystem.css" />
  <link rel="stylesheet" href="../../../../shared/styles/errlPortalHeader.css" />
  <style>
    :root {
      --errl-divider-core: rgba(var(--errl-neon-purple-rgb), 0.18);
      --errl-drip-shadow: rgba(0, 0, 0, 0.6);
    }
    body.errl-about-bg {
      background-color: var(--errl-bg);
      background-image: var(--errl-bg-gradient);
      background-repeat: no-repeat;
      background-size: 120% 120%;
      background-attachment: fixed;
      color: var(--errl-text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Inter", "Roboto", sans-serif;
      line-height: 1.55;
      letter-spacing: -0.02em;
      margin: 0;
      min-height: 100vh;
    }
    .about-shell { max-width: 76rem; margin: 0 auto; padding-bottom: 5rem; }
    .drip-section { position: relative; padding: 3.5rem 1.5rem 4rem; margin: 0 auto; max-width: 75rem; }
    .drip-section::before { content: ""; position: absolute; inset: 0; border-radius: 2rem; background: radial-gradient(circle at 50% 0%, rgba(var(--errl-neon-cyan-rgb), 0.08) 0%, rgba(var(--errl-neon-purple-rgb), 0.05) 40%, rgba(0,0,0,0) 70%); filter: blur(28px); opacity: 0.5; pointer-events: none; }
    .section-title { margin: 0; font-size: clamp(1.05rem, 0.5vw + 1rem, 1.25rem); font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--errl-text); }
    .subtitle { margin: 0.45rem 0 1.3rem; font-size: clamp(1.4rem, 1vw + 1rem, 2rem); font-weight: 500; text-shadow: 0 0 10px var(--errl-glow-teal), 0 0 24px var(--errl-glow-violet); }
    .drip-section p { max-width: 64ch; color: var(--errl-text-soft); margin: 0 0 1rem; }
    .about-eyebrow { text-transform: uppercase; letter-spacing: 0.16em; font-size: 0.72rem; color: rgba(var(--errl-neon-cyan-rgb), 0.95); margin: 0 0 0.8rem; }
    .about-hero-title { margin: 0; font-size: clamp(2rem, 2vw + 1rem, 3.2rem); line-height: 1.08; text-shadow: 0 0 16px var(--errl-glow-teal), 0 0 40px var(--errl-glow-violet); }
    .about-hero-subtitle { margin: 1rem 0 1.4rem; max-width: 52ch; color: var(--errl-text); }
    .about-tools-list, .extrepa-obsessions { margin: 1rem 0 0; padding-left: 1.1rem; color: rgba(var(--errl-neon-cyan-rgb), 0.9); }
    .about-tools-list li, .extrepa-obsessions li { margin-bottom: 0.4rem; }
    .extrepa-section { display: grid; gap: 1.4rem; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); align-items: start; }
    .extrepa-panel-left, .extrepa-panel-right { border: 1px solid rgba(var(--errl-neon-cyan-rgb), 0.2); background: linear-gradient(150deg, rgba(7, 15, 25, 0.86), rgba(6, 10, 20, 0.82)); border-radius: 1.2rem; padding: 1.2rem; box-shadow: 0 10px 32px rgba(0, 0, 0, 0.35); }
    .extrepa-avatar-placeholder { width: 100%; aspect-ratio: 4 / 3; border-radius: 0.9rem; border: 1px dashed rgba(var(--errl-neon-purple-rgb), 0.6); background: radial-gradient(circle at 30% 30%, rgba(var(--errl-neon-cyan-rgb), 0.2), rgba(var(--errl-neon-purple-rgb), 0.08)); margin-bottom: 1rem; }
    .extrepa-kicker { margin: 0.5rem 0; color: var(--errl-text); }
    .extrepa-status { margin: 0.6rem 0 1rem; color: rgba(var(--errl-neon-green-rgb), 0.92); font-weight: 600; }
    .extrepa-links { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .about-inline-link { text-decoration: none; padding: 0.35rem 0.6rem; border-radius: 999px; border: 1px solid rgba(var(--errl-neon-cyan-rgb), 0.35); color: var(--errl-text); font-size: 0.8rem; }
    .explore-grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .explore-card { text-decoration: none; border-radius: 1rem; border: 1px solid rgba(var(--errl-neon-purple-rgb), 0.3); background: linear-gradient(145deg, rgba(18, 24, 38, 0.9), rgba(12, 16, 30, 0.88)); padding: 1rem; color: inherit; }
    .explore-card h4 { margin: 0 0 0.45rem; }
    .explore-card p { margin: 0 0 0.8rem; font-size: 0.92rem; color: var(--errl-text-soft); }
    .explore-card span { text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.72rem; color: rgba(var(--errl-neon-cyan-rgb), 0.9); }
    .drip-divider { width: 100%; height: 105px; position: relative; overflow: visible; margin: 0 auto; max-width: 75rem; }
    .drip-divider::before { content: ""; position: absolute; left: 10%; right: 10%; top: 20px; height: 2px; background: radial-gradient(circle at 50% 50%, var(--errl-divider-core) 0%, transparent 70%); box-shadow: 0 0 12px var(--errl-divider-core), 0 0 36px var(--errl-divider-core), 0 26px 70px var(--errl-drip-shadow); filter: blur(2px); }
    .fade-in { opacity: 0; transform: translateY(30px) scale(0.99); filter: blur(6px); transition: opacity 0.8s cubic-bezier(.16,1,.3,1), transform 0.8s cubic-bezier(.16,1,.3,1), filter 0.8s cubic-bezier(.16,1,.3,1); }
    .fade-in.is-visible { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  </style>
  <script>
    (function () { try { if (localStorage.getItem("errl_portal_show_design_nav") !== "true") { document.documentElement.setAttribute("data-errl-hide-design-nav", ""); } } catch (e) {} })();
  </script>
</head>
<body class="errl-about-bg">
  <header class="errl-header">
    <div class="errl-header-content">
      <a class="errl-home-btn" href="/"><span class="chevron">◀</span><span>Back to Portal</span></a>
      <nav class="errl-nav" aria-label="Portal sections">
        <a class="errl-bubble-btn active" href="/about/" data-portal-link="about/" aria-current="page">About Errl</a>
        <a class="errl-bubble-btn" href="/assets/" data-portal-link="assets/">Assets</a>
        <a class="errl-bubble-btn" href="/design/" data-errl-nav="design" data-portal-link="design/" data-disabled-link="design" aria-disabled="true" tabindex="-1" title="Coming soon">Design</a>
        <a class="errl-bubble-btn" href="https://forum.errl.wtf">Forum</a>
        <a class="errl-bubble-btn" href="/gallery/" data-portal-link="gallery/">Gallery</a>
        <a class="errl-bubble-btn" href="/studio/" data-portal-link="studio/">Studio</a>
      </nav>
    </div>
  </header>

  <main class="about-shell" id="about-root"></main>

  <script type="module">
    import { aboutPageContent } from "../../content/about-content.mjs";
    import { mountAboutPage, setupFadeInSections } from "../../../../shared/scripts/static-content-renderers.mjs";

    const root = document.getElementById("about-root");
    mountAboutPage(root, aboutPageContent);
    setupFadeInSections(root);

    const drips = document.querySelectorAll(".drip-divider");
    window.addEventListener("scroll", () => {
      const y = window.scrollY;
      drips.forEach((el, i) => {
        const offset = y * 0.06 + i * 7;
        el.style.filter = "hue-rotate(" + offset + "deg)";
        el.style.transform = "translateY(" + Math.sin(y / 200 + i * 0.5) * 4 + "px)";
      });
    });

    const TOAST_ID = "errl-coming-soon-toast";
    let hideTimer = null;
    function showToast(message) {
      let el = document.getElementById(TOAST_ID);
      if (!el) {
        el = document.createElement("div");
        el.id = TOAST_ID;
        Object.assign(el.style, {
          position: "fixed", left: "50%", bottom: "18px", transform: "translateX(-50%)", zIndex: "9999",
          maxWidth: Math.min(window.innerWidth * 0.92, 520) + "px", padding: "10px 14px", borderRadius: "999px",
          border: "1px solid rgba(255,255,255,0.22)", background: "rgba(10, 14, 24, 0.88)", backdropFilter: "blur(10px)",
          color: "rgba(240, 245, 255, 0.96)", font: "600 12px/1.2 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif",
          letterSpacing: "0.04em", textTransform: "uppercase", boxShadow: "0 10px 24px rgba(0,0,0,0.45)", opacity: "0",
          transition: "opacity 140ms ease, transform 140ms ease"
        });
        document.body.appendChild(el);
      }
      el.textContent = message;
      el.style.opacity = "1";
      el.style.transform = "translateX(-50%) translateY(0)";
      if (hideTimer) window.clearTimeout(hideTimer);
      hideTimer = window.setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateX(-50%) translateY(6px)";
      }, 1400);
    }
    document.querySelectorAll('[data-disabled-link="design"]').forEach((el) => {
      el.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        showToast("Design - coming soon");
      });
    });
  </script>
  <script type="module" src="../../../../shared/scripts/portal-nav-visibility.mjs"></script>
</body>
</html>
