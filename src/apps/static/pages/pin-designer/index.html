<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Errl Pin Designer — Interactive Enamel Mockups</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../../shared/styles/errlDesignSystem.css" />
<style>
:root{ --ink:#e5eaf1; --gap:28px; --outer-pad:32px; }
*{box-sizing:border-box} html,body{height:100%;margin:0}
body{font-family:Inter,system-ui,sans-serif; background:#0a0f18; color:var(--ink);} 

.box{ position:relative; display:flex; flex-direction:column; border-radius:16px; background:#ffffff06; border:1px solid #ffffff14; box-shadow:0 12px 30px rgba(0,0,0,.38); overflow:hidden; width: 100%; max-width: 1400px; margin: 16px var(--outer-pad) var(--outer-pad); min-height: 80vh; }
.box header{ position:relative; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 20px; font-weight:700; color:#cfe9ff; border-bottom:1px solid #ffffff14; background:linear-gradient(180deg, rgba(12,18,32,.7), rgba(10,15,24,.6)); }
.box .frame{ position:relative; flex:1; display:grid; place-items:center; background:
  radial-gradient(80% 60% at 50% 35%, rgba(123,92,255,.18), rgba(123,92,255,0) 60%),
  radial-gradient(120% 100% at 50% 120%, rgba(0,229,255,.10), rgba(0,229,255,0) 60%),
  linear-gradient(180deg, #0f1326, #0a0f18 60%);
  min-height: 0;
  overflow: hidden;
}
.box .frame iframe{ width:100%; height:100%; border:0; background:transparent; min-height: 500px; }
@media (max-width: 900px){ 
  .box{ margin: 16px 20px 20px; min-height: 70vh; max-width: 100%; }
  .box .frame{ min-height: 60vh; }
  .box .frame iframe{ min-height: 60vh; width: 100%; height: 100%; }
  :root{ --outer-pad:20px; }
}
@media (max-width: 640px){
  .box{ margin: 12px 16px 16px; min-height: 65vh; }
  .box header{ padding: 8px 16px; font-size: 0.9rem; }
  .box .frame{ min-height: 55vh; }
  .box .frame iframe{ min-height: 55vh; }
  :root{ --outer-pad:16px; }
}
</style>
<link rel="stylesheet" href="../../../../shared/styles/errlPortalHeader.css" />
  <script>
    (function () { try { if (localStorage.getItem('errl_portal_show_design_nav') !== 'true') { document.documentElement.setAttribute('data-errl-hide-design-nav', ''); } } catch (e) {} })();
  </script>
<link rel="stylesheet" href="../../../../apps/landing/fx/errl-bg.css">
</head>
<body>
  <header class="errl-header">
    <div class="errl-header-content">
      <a class="errl-home-btn" href="/"><span class="chevron">◀</span><span>Back to Portal</span></a>
      <nav class="errl-nav" aria-label="Portal sections">
        <a class="errl-bubble-btn" href="/about/" data-portal-link="about/">About Errl</a>
        <a class="errl-bubble-btn" href="/assets/" data-portal-link="assets/">Assets</a>
        <a class="errl-bubble-btn" href="/design/" data-errl-nav="design" data-portal-link="design/" data-disabled-link="design" aria-disabled="true" tabindex="-1" title="Coming soon">Design</a>
        <a class="errl-bubble-btn" href="https://forum.errl.wtf">Forum</a>
        <a class="errl-bubble-btn" href="/gallery/" data-portal-link="gallery/">Gallery</a>
        <a class="errl-bubble-btn" href="/studio/" data-portal-link="studio/">Studio</a>
      </nav>
    </div>
  </header>
  <article class="box">
    <header>
      <span>Pin Designer</span>
    </header>
    <div class="frame">
      <iframe src="./pin-designer.html" loading="lazy" title="Pin Designer"></iframe>
    </div>
  </article>
<script type="module">
  // Hide header when embedded in iframe (e.g., in React Studio shell)
  if (window.self !== window.top) {
    const header = document.querySelector('.errl-header');
    if (header) {
      header.style.display = 'none';
    }
  }
  // Simple URL resolver for portal pages - same in dev and production
  function resolvePortalUrl(pagePath) {
    let clean = pagePath.replace(/^pages\//, '');
    clean = clean.replace(/^\//, '');
    clean = clean.replace(/\/$/, ''); // Remove trailing slash
    clean = clean.replace(/\/index\.html$/, '');
    clean = clean.replace(/index\.html$/, '');
    return clean ? `/${clean}/` : '/';
  }
  
  document.querySelectorAll('[data-portal-link]').forEach((el) => {
    const target = el.getAttribute('data-portal-link');
    if (target) {
      const url = resolvePortalUrl(target);
      el.setAttribute('href', url);
    }
  });
  
  // Disabled links (Design): prevent navigation and show “Coming soon”.
  (() => {
    const TOAST_ID = 'errl-coming-soon-toast';
    let hideTimer = null;
    function showToast(message) {
      let el = document.getElementById(TOAST_ID);
      if (!el) {
        el = document.createElement('div');
        el.id = TOAST_ID;
        el.style.position = 'fixed';
        el.style.left = '50%';
        el.style.bottom = '18px';
        el.style.transform = 'translateX(-50%)';
        el.style.zIndex = '9999';
        el.style.maxWidth = 'min(92vw, 520px)';
        el.style.padding = '10px 14px';
        el.style.borderRadius = '999px';
        el.style.border = '1px solid rgba(255,255,255,0.22)';
        el.style.background = 'rgba(10, 14, 24, 0.88)';
        el.style.backdropFilter = 'blur(10px)';
        el.style.color = 'rgba(240, 245, 255, 0.96)';
        el.style.font = "600 12px/1.2 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif";
        el.style.letterSpacing = '0.04em';
        el.style.textTransform = 'uppercase';
        el.style.boxShadow = '0 10px 24px rgba(0,0,0,0.45)';
        el.style.opacity = '0';
        el.style.transition = 'opacity 140ms ease, transform 140ms ease';
        document.body.appendChild(el);
      }
      el.textContent = message;
      el.style.opacity = '1';
      el.style.transform = 'translateX(-50%) translateY(0)';
      if (hideTimer) window.clearTimeout(hideTimer);
      hideTimer = window.setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateX(-50%) translateY(6px)';
      }, 1400);
    }

    document.querySelectorAll('[data-disabled-link="design"]').forEach((el) => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        showToast('Design — coming soon');
      });
    });
  })();
</script>
<script type="module" src="../../../../shared/scripts/portal-nav-visibility.mjs"></script>
</body>
</html>
